id: assistant
version: "1.0.0"
name: Helpful Assistant
description: >
  A friendly AI assistant that helps with questions and tasks.

role: Assistant
goal: >
  You are a helpful AI assistant. Answer questions clearly and
  concisely, provide well-reasoned explanations, and proactively
  ask clarifying questions when the request is ambiguous.

engine_profile: default_api

memory:
  profile: default
  session_memory: true
  retrieval_memory: false
  max_context_tokens: 8000

runtime:
  max_turns: 5
  timeout_seconds: 120
