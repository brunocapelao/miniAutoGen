# TODO(review): Switch to Poetry cache instead of pip cache (Code reviewer, 2026-03-18, Medium)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev --no-interaction

      - name: Ruff check
        run: poetry run ruff check miniautogen/ tests/

      - name: Mypy check
        run: poetry run mypy miniautogen/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest tests/ --cov=miniautogen --cov-report=json --cov-report=term

  arch-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run architecture linter
        run: python scripts/check_arch.py

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, arch-check]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.arch-check.result }}" != "success" ]]; then
            echo "One or more CI jobs failed or were cancelled."
            echo "  lint:       ${{ needs.lint.result }}"
            echo "  test:       ${{ needs.test.result }}"
            echo "  arch-check: ${{ needs.arch-check.result }}"
            exit 1
          fi
          echo "All CI gates passed"
